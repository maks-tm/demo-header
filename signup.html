<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="register.css">
</head>

<body>
    <header class="header">
        <div class="signin-container">
            <div class="back-btn-box">
                <a href="index.html"><img src="left.png" alt=""></a>
            </div>
            <div class="logo-box">
                <a href="index.html" class="logo"><img src="logo.png" alt=""></a>
            </div>
        </div>
    </header>

    <!-- Signin section -->
    <main class="main">
        <div class="signin-wrapper">
            <div class="signup-box">
                <div class="login-title">
                    <h1>Create account</h1>
                </div>
                <form class="form" action="">
                    <label for="">Your name</label>
                    <input type="text" name="name" id="name" required autocomplete="off">
                    <label for="">Your email</label>
                    <input type="text" name="name" id="name" required autocomplete="off">
                    <label for="">Password</label>
                    <input type="text" name="password" id="password" required autocomplete="off">
                    <label for="">Confirm</label>
                    <input type="text" name="password" id="password" required autocomplete="off">
                </form>
                <div class="checkbox">
                    <input type="checkbox">
                    <p>By clicking you agree<a href="">Terms and privacy</a></p>
                </div>
                <div class="signup-submit">
                    <button class="btn" id="login-btn">Signup</button>
                </div>
                <div class="signup-text">
                    <p>Do you have an account ? <a href="signin.html">Signin <img src="right.png" alt=""></a></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
